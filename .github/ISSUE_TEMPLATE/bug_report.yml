name: Bug report
description: Report a reproducible bug in Tileline
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Please include concrete reproduction steps and environment details.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What is wrong?
      placeholder: Short description of the bug.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction steps
      description: Exact steps to reproduce.
      placeholder: |
        1. Run ...
        2. Open ...
        3. Observe ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: textarea
    id: logs
    attributes:
      label: Logs / telemetry / screenshots
      description: Paste relevant logs, stack traces, or telemetry snippets.
      render: shell
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Tag or commit hash (for example, v0.4.5.1 or master SHA).
    validations:
      required: true
  - type: input
    id: platform
    attributes:
      label: Platform
      description: OS + architecture + GPU where relevant.
      placeholder: macOS 14 arm64, Apple M2 / Linux x86_64, NVIDIA...
    validations:
      required: true
